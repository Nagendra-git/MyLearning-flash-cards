<h4>intern()</h4>
<pre>
    Moves string to string pool
    String s1 = new String("Java");
    String s2 = s1.intern();
    String s3 = "Java";
    sysout(s2 == s3)//true
</pre>
<h4>String is final</h4>
<pre>
    public final class String
    
    can't inherit.
    Why final?
    To preserve immutability.
</pre>
