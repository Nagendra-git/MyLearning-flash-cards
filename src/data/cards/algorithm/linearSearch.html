<h4>Linear Search</h4>
<pre>
Check every element one by one. Works on unsorted data.
->Time : O(n)
->Sapce : O(1)
</pre>
<div class="code-block">
  <div class="code-header">Pseudo Code</div>
  <pre><code>FUNCTION linearSearc(arr, target)
    FOR i FORM 0 TO length(arr)-1
        IF arr[i] EQUALS target THEN
            RETURN i
        END IF
    END FOR
    RETURN -1
END FUNCTION
</code></pre>
</div>
